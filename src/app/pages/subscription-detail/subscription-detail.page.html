<ion-header>

  <ion-toolbar class="custom-toolbar">

    <ion-buttons slot="start">
      <ion-back-button
        defaultHref="/home"
        text="">
      </ion-back-button>
    </ion-buttons>

    <ion-title *ngIf="subscription">
      {{ getIcon(subscription.name) }}
      {{ subscription.name }}
    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngIf="subscription">

    <ion-card-content>

      <ion-item>
        <ion-input
          label="Nombre"
          labelPlacement="stacked"
          [(ngModel)]="subscription.name">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          type="number"
          label="Precio (€)"
          labelPlacement="stacked"
          [(ngModel)]="subscription.price">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-select
          label="Facturación"
          labelPlacement="stacked"
          [(ngModel)]="subscription.billingCycle">

          <ion-select-option value="monthly">
            Mensual
          </ion-select-option>

          <ion-select-option value="yearly">
            Anual
          </ion-select-option>

        </ion-select>
      </ion-item>

      <ion-button
        expand="block"
        (click)="updateSubscription()">

        💾 Guardar cambios

      </ion-button>

    </ion-card-content>

  </ion-card>

</ion-content>
